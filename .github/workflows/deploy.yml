name: Deploy API

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/nihadrasulzada/ask/ask-api:latest -f src/App.API/Dockerfile src

      - name: Push Image
        run: docker push ghcr.io/nihadrasulzada/ask/ask-api:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH with password
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}   # <-- buraya password verirsen
          script: |
            cd /home/app

            export DB_PASSWORD=$DB_PASSWORD
            export DB_CONNECTION="$DB_CONNECTION"

            export CLOUDINARY_NAME=$CLOUDINARY_NAME
            export CLOUDINARY_KEY=$CLOUDINARY_KEY
            export CLOUDINARY_SECRET=$CLOUDINARY_SECRET

            export EXCHANGE_API_KEY=$EXCHANGE_API_KEY

            docker compose pull
            docker compose up -d