name: Deploy API

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u nihadrasulzada --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/nihadrasulzada/ask-api:latest -f src/App.API/Dockerfile src

      - name: Push Image
        run: docker push ghcr.io/nihadrasulzada/ask-api:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: GHCR_PAT,DB_PASSWORD,DB_CONNECTION,CLOUDINARY_NAME,CLOUDINARY_KEY,CLOUDINARY_SECRET,EXCHANGE_API_KEY
          script: |
            mkdir -p /home/app
            cd /home/app
            echo "$GHCR_PAT" | docker login ghcr.io -u nihadrasulzada --password-stdin
            docker compose pull
            docker compose up -d
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}