services:
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-ask-minio}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - ask-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${DB_CONTAINER_NAME}
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
    restart: unless-stopped
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s
    networks:
      - ask-network

  api:
    build:
      context: .
      dockerfile: src/App.API/Dockerfile
    container_name: ${API_CONTAINER_NAME}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=${MSSQL_DATABASE};User Id=sa;Password=${DB_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True
      MinioSettings__Endpoint: minio:9000
      MinioSettings__AccessKey: ${MINIO_ACCESS_KEY}
      MinioSettings__SecretKey: ${MINIO_SECRET_KEY}
      MinioSettings__BucketName: ${MINIO_BUCKET_NAME:-ask}
      MinioSettings__UseSSL: "false"
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - ask-network

networks:
  ask-network:
    driver: bridge

volumes:
  mssql-data:
  minio-data:
